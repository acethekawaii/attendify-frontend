<div
  class="flex h-full flex-col rounded-xl border border-line bg-white p-6 transition-shadow duration-200 hover:shadow-[0_4px_16px_rgba(14,111,194,0.12)]"
>
  <div class="flex items-start justify-between gap-3">
    <span
      class="inline-flex h-11 w-11 items-center justify-center rounded-lg bg-monochromatic-light text-primary-action"
    >
      <mat-icon aria-hidden="true">{{ icon }}</mat-icon>
    </span>
    <span
      class="rounded-full px-2.5 py-0.5 text-xs font-semibold"
      [class.bg-monochromatic-light]="type === 'New'"
      [class.text-primary-action]="type === 'New'"
      [class.bg-surface-muted]="type !== 'New'"
      [class.text-text-300]="type !== 'New'"
    >
      {{ type }}
    </span>
  </div>

  <div class="mt-5 space-y-1.5">
    <h3 class="text-lg font-semibold text-text-900">{{ title }}</h3>
    <p class="text-sm leading-relaxed text-text-300">{{ description }}</p>
  </div>
</div>
